<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>
</head>

<body>

<div class="app">

  <header>
    <h1>Expenses</h1>
    <p id="total">₹0</p>

    <!-- Progress -->
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <!-- Budget -->
    <div class="budget-box">
      <input type="number" id="budget-input" placeholder="Set monthly budget ₹" min="0" />
      <button id="save-budget">Save</button>
    </div>

    <!-- Insights -->
    <p id="insight">Track your spending wisely 💡</p>

    <!-- Add Expense -->
    <form id="expense-form">
      <input type="number" id="amount" placeholder="Enter amount" required />

      <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Others</option>
      </select>

      <!-- Custom category -->
      <input type="text" id="custom-category" placeholder="Enter custom category" style="display:none;" />

      <button type="submit">Add</button>
    </form>
  </header>

  <main id="expense-list"></main>

  <div class="actions">
    <button id="export-btn">Export</button>
    <button id="import-btn">Import</button>
    <input type="file" id="file-input" hidden />
  </div>

</div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
